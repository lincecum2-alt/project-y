name: Update Project Y market data
on:
  workflow_dispatch:
  schedule:
    - cron: "10 9 * * 1-5"
    - cron: "30 22 * * 1-5"
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python scripts/update_market_data.py
      - run: |
          git config user.name "project-y-bot"
          git config user.email "project-y-bot@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto-update market data"
            git push
          fi
